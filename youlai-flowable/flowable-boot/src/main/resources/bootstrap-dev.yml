spring:
  main:
    allow-circular-references: true
  mvc:
    path-match:
      matching-strategy: ant_path_matcher
  cloud:
    nacos:
      discovery:
        server-addr: @nacos-server@
        namespace: @nacos-namespace@
      config:
        server-addr: @nacos-server@
        namespace: @nacos-namespace@
        file-extension: yaml
        shared-configs[0]:
          data-id: youlai-common.yaml
          refresh: true
flowable:
  database-schema-update: true
  async-executor-activate: false
