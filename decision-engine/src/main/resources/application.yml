spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${mysql.host:localhost}:${mysql.port:3306}/youlai_cloud?zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&autoReconnect=true
    username: ${mysql.username:root}
    password: ${mysql.password:123456}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.youlai.decision.controller
  info:
    title: 决策引擎服务
    version: 1.0.0
    description: 策略资产、规则执行、决策流测试、执行日志和审计接口
    contact:
      name: youlai
      url: https://www.youlai.tech
      email: youlaitech@163.com
    license:
      name: Apache-2.0
      url: https://www.apache.org/licenses/LICENSE-2.0

decision:
  engine:
    hare:
      mode: mock
      base-url: ${hare.base-url:}
    publish:
      workflow-model-id: ${decision.publish.workflow-model-id:}
      flowable-base-url: ${decision.publish.flowable-base-url:http://localhost:8810}
