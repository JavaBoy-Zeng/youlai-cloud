spring:
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      # 注册中心
      discovery:
        server-addr: @nacos-server@
        namespace: @nacos-namespace@
      # 配置中心
      config:
        server-addr: @nacos-server@
        namespace: @nacos-namespace@
        file-extension: yaml
        shared-configs[0]:
          data-id: youlai-common.yaml
          refresh: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: @auth-server-url@
          jwk-set-uri: @auth-server-url@/oauth2/jwks
      client:
        registration:
          messaging-client-oidc:
            # 认证提供者，和provider中的名称对应
            provider: custom-issuer
            client-id: messaging-client
            client-secret: 123456
            client-authentication-method: client_secret_basic
            authorization-grant-type: authorization_code
            # 授权成功后的回调地址，Spring Security Client 使用 Code 换 Token 的地址
            redirect-uri: http://127.0.0.1:@service.port@/login/oauth2/code/messaging-client-oidc
            scope: openid, profile
            client-name: messaging-client-oidc
        provider:
          custom-issuer:
            authorization-uri: @auth-server-url@/oauth2/authorize
            token-uri: @auth-server-url@/oauth2/token
            jwk-set-uri: @auth-server-url@/oauth2/jwks
            user-info-uri: @auth-server-url@/userinfo
            user-name-attribute: sub
