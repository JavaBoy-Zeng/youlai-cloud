server:
  port: ${service.port:9500}

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${mysql.host:localhost}:${mysql.port:3306}/youlai_collect?zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&autoReconnect=true
    username: ${mysql.username:root}
    password: ${mysql.password:!QAZ2wsx}
  cloud:
    nacos:
      discovery:
        server-addr: ${nacos.server-addr:127.0.0.1:8848}
        namespace: ${nacos.namespace:public}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: collect
      paths-to-match: '/**'
      packages-to-scan: com.youlai.collect.controller
  info:
    title: 数据采集服务
    version: 1.0.0
    description: 模型、采集接口、采集任务、执行实例与内部消息管理
