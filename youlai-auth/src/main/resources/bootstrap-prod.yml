spring:
  mvc:
    path-match:
      matching-strategy: ant_path_matcher
  cloud:
    nacos:
      # 注册中心
      discovery:
        server-addr: @nacos-server@
        namespace: @nacos-namespace@
      # 配置中心
      config:
        server-addr: @nacos-server@
        namespace: @nacos-namespace@
        file-extension: yaml
        shared-configs[0]:
          data-id: youlai-common.yaml
          refresh: true

custom:
  security:
    issuer-url: @auth-server-url@
